name: CI
on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Check (${{ matrix.name }})
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - name: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - name: macos-aarch64
            target: aarch64-apple-darwin
          - name: macos-x86_64
            target: x86_64-apple-darwin
    runs-on: ${{ contains(matrix.target, 'apple') && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: ${{ matrix.target }}

      - name: Cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Format
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --target ${{ matrix.target }} -- -D warnings
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++

      - name: Test
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo test
