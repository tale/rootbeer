pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --fix --allow-dirty --allow-staged -- -D warnings
      stage_fixed: true
    test:
      glob: "{*.rs,lua/**/*.lua}"
      run: cargo test --workspace --quiet
    oxfmt:
      glob: "*.{js,ts}"
      run: pnpm oxfmt --write {staged_files}
      stage_fixed: true
    stylua:
      glob: "*.lua"
      run: stylua {staged_files}
      stage_fixed: true
    selene:
      glob: "*.lua"
      run: selene {staged_files}
    lua2md:
      glob: "{lua/rootbeer/*.lua,scripts/lua2md.ts,.vitepress/nav.ts}"
      run: pnpm lua2md
      stage_fixed: true
