pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --fix --allow-dirty --allow-staged -- -D warnings
      stage_fixed: true
    test:
      glob: "{*.rs,lua/**/*.lua}"
      run: cargo test --workspace --quiet
    oxfmt:
      glob: "*.{js,ts}"
      run: pnpm oxfmt --write {staged_files}
      stage_fixed: true
